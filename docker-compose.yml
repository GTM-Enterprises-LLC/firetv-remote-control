services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    network_mode: host
    environment:
      - FIRETV_IP=${FIRETV_IP}
      - PORT=3003
      - CORS_ORIGIN=*
      - NODE_ENV=production
    restart: unless-stopped

  ui:
    build:
      context: ui
      dockerfile: Dockerfile
      args:
        - VITE_BASE_PATH=/firetv/
        - VITE_API_URL=/firetv/api/v1
    network_mode: host
    depends_on:
      - server
    restart: unless-stopped
