services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - FIRETV_IP=${FIRETV_IP}
      - PORT=3001
      - CORS_ORIGIN=*
      - NODE_ENV=production
    volumes:
      - ${HOME}/.android:/root/.android:ro
    restart: unless-stopped

  ui:
    build:
      context: ui
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
